<div>
  <div class="sm:flex sm:items-start justify-between">
    <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
      <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white" id="modal-title">
        {{ title }}
      </h3>
      <div class="mt-4">
        <form hx-{{ method.lower() }}="{{ action_url }}" 
              {% if method == 'POST' %}hx-target="#transaction-tbody" hx-swap="afterbegin"{% else %}hx-target="#txn-row-{{ txn.id }}" hx-swap="outerHTML"{% endif %}
              class="space-y-4 text-left">
          
          {% if error %}
          <div class="bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-md p-3">
            <p class="text-sm font-medium text-red-800 dark:text-red-300">{{ error }}</p>
          </div>
          {% endif %}

          <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
              <label for="type" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Type *</label>
              <select id="type" name="type" required class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <option value="sale" {% if txn and txn.type == 'sale' %}selected{% endif %}>Sale</option>
                <option value="expense" {% if txn and txn.type == 'expense' %}selected{% endif %}>Expense</option>
                <option value="credit_given" {% if txn and txn.type == 'credit_given' %}selected{% endif %}>Credit Given</option>
                <option value="credit_taken" {% if txn and txn.type == 'credit_taken' %}selected{% endif %}>Credit Taken</option>
              </select>
            </div>
            
            <div>
              <label for="date" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Date *</label>
              <input type="date" name="date" id="date" required value="{{ txn.date.isoformat() if txn else '' }}" 
                     class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
          </div>

          <div>
            <label for="amount" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Amount *</label>
            <div class="mt-1 relative rounded-md shadow-sm">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <span class="text-gray-500 sm:text-sm">₹</span>
              </div>
              <input type="number" name="amount" id="amount" required step="0.01" min="0.01" value="{{ txn.amount if txn else '' }}"
                     class="pl-7 mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="0.00">
            </div>
          </div>

          <div>
            <label for="description" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
            <input type="text" name="description" id="description" value="{{ txn.description or '' }}"
                   class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="What was this for?">
          </div>

          <div>
            <label for="note" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Additional Notes</label>
            <textarea id="note" name="note" rows="2" 
                      class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">{{ txn.note or '' }}</textarea>
          </div>

          <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
            <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm relative group">
              <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                <svg class="htmx-indicator animate-spin h-5 w-5 text-indigo-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
              </span>
              Save
            </button>
            <button type="button" @click="modalOpen = false" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-600 shadow-sm px-4 py-2 bg-white dark:bg-gray-700 text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
