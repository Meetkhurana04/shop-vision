{% set wdata = data if data else widget_data_map[widget.id] %}
<div class="flex flex-col h-full">
  <div class="flex items-center justify-between mb-4 border-b border-divider pb-2">
    <h3 class="text-sm font-bold font-mono tracking-widest text-white uppercase">{{ wdata.title }}</h3>
    <a href="/reports" class="text-xs font-mono font-medium text-indigo-400 hover:text-indigo-300">[VIEW_ALL]</a>
  </div>
  <div class="flex-1 relative min-h-[250px]" x-data="{ chartInstance: null }" x-init="
    const ctx = $refs.canvas.getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {{ wdata.chart_data | tojson }},
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { 
            beginAtZero: true,
            grid: {
              color: 'rgba(255, 255, 255, 0.05)'
            },
            ticks: {
              color: '#666666',
              font: { family: 'Geist Mono', size: 10 }
            }
          },
          x: {
            grid: {
              display: false
            },
            ticks: {
              color: '#666666',
              font: { family: 'Geist Mono', size: 10 }
            }
          }
        }
      }
    });
    
    // Cleanup to prevent memory leaks if HTMX swaps out
    $el.addEventListener('htmx:beforeCleanupElement', () => {
        if(chartInstance) chartInstance.destroy();
    });
  ">
    <canvas x-ref="canvas"></canvas>
  </div>
</div>
<!-- Chart.js dependency (only loaded once, better to put in base if used everywhere, but here is okay for a single page app style if injected via HTMX it might not execute. We will ensure Chart.js is loaded in the dashboard index or base) -->
{% if not request.headers.get("hx-request") %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endif %}
