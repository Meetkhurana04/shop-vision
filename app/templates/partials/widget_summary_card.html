{% set wdata = data if data else widget_data_map[widget.id] %}
<div class="flex items-center">
  <div class="flex-shrink-0">
    {% if wdata.color == 'green' %}
    <div class="rounded-xl border border-success/30 bg-success/15 p-3 flex items-center justify-center">
      <svg class="h-6 w-6 text-success" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    {% elif wdata.color == 'yellow' %}
    <div class="rounded-xl border border-error/30 bg-error/15 p-3 flex items-center justify-center">
      <svg class="h-6 w-6 text-error" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>
    {% else %}
    <div class="rounded-xl border border-primary/30 bg-primary/15 p-3 flex items-center justify-center">
      <svg class="h-6 w-6 text-indigo-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
      </svg>
    </div>
    {% endif %}
  </div>
  <div class="ml-4 w-0 flex-1">
    <dl>
      <dt class="text-[10px] font-mono uppercase tracking-[0.2em] text-textHint">
        {{ wdata.title }}
      </dt>
      <dd class="text-2xl font-bold font-heading tabular-nums mt-1 text-white tracking-tight">
        {% if wdata.is_currency %}₹{% endif %}{{ "{:,.2f}".format(wdata.value) }}
      </dd>
    </dl>
  </div>
</div>
