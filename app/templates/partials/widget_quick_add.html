{% set wdata = data if data else widget_data_map[widget.id] %}
<div class="flex flex-col h-full justify-center text-center px-4 py-2">
  <h3 class="text-sm font-bold font-mono tracking-widest text-white uppercase mb-3">{{ wdata.title }}</h3>
  <p class="text-xs font-mono text-textSecondary mb-6">Quickly record a new sale or expense without leaving the dashboard.</p>
  
  <button type="button" @click="modalOpen = true" hx-get="/transactions/add" hx-target="#dashboard-modal-content"
    class="inline-flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-primary to-primary-dark px-4 py-3 text-xs font-mono font-semibold text-white shadow-lg shadow-primary/10 hover:shadow-primary/25 hover:scale-[1.02] active:scale-98 transition-all">
    <svg class="-ml-1 mr-2 h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    [RECORD_TRANSACTION]
  </button>
</div>
